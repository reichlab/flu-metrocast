methods: "Median-based ensemble of quantile forecasts submissions and mean ensemble for categorical rate-trend forecasts."
data_inputs: "Weekly incident flu hospitalizations from data.cdc.gov Weekly Hospital Respiratory Data (HRD) Metrics by Jurisdiction, National Healthcare Safety Network (NHSN)."
methods_long: "The Hubverse package hubEnsembles is used to generate the FluSight-ensemble forecast. A median of quantile outputs is used for all eligible quantile-based forecasts submitted to the FluSight-forecasting-hub. The mean is used to ensemble probabilities from eligible categorical rate-trend forecasts."
